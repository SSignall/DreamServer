name: xtts

services:
  xtts:
    image: ghcr.io/coqui-ai/xtts-streaming-server:v1.0-cuda121
    container_name: dream-xtts
    ports:
      - "${XTTS_PORT:-8100}:80"
    volumes:
      - ./data/xtts:/app/tts_models
    environment:
      - COQUI_TOS_AGREED=1
      - PORT=80
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dream-network

networks:
  dream-network:
    external: true
    name: dream-network
