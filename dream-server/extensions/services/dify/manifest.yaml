schema_version: dream.services.v1

service:
  id: dify
  name: Dify (AI Workflow Builder)
  aliases: [workflow, agent, llm-app]
  container_name: dream-dify
  host_env: DIFY_HOST
  default_host: dify
  port: 5001
  external_port_env: DIFY_PORT
  external_port_default: 8002
  health: /health
  type: docker
  gpu_backends: [amd, nvidia]
  compose_file: compose.yaml
  category: optional
  depends_on: [llama-server]
