services:
  dify:
    image: langgenius/dify:latest
    container_name: dream-dify
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - CONSOLE_API_URL=http://localhost:${DIFY_PORT:-8002}
      - CONSOLE_WEB_URL=http://localhost:${DIFY_PORT:-8002}
      - SERVICE_API_URL=http://dify:5001
      - APP_API_URL=http://dify:5001
      - FILES_URL=http://localhost:${DIFY_PORT:-8002}
      - INTERNAL_FILES_URL=http://dify:5001
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - PYTHONIOENCODING=utf-8
      - UV_CACHE_DIR=/tmp/.uv-cache
      - LOG_LEVEL=INFO
      - LOG_OUTPUT_FORMAT=text
      - LOG_FILE=/app/logs/server.log
      - LOG_FILE_MAX_SIZE=20
      - LOG_FILE_BACKUP_COUNT=5
      - LOG_DATEFORMAT=%Y-%m-%d %H:%M:%S
      - LOG_TZ=UTC
      - DEBUG=false
      - FLASK_DEBUG=false
      - ENABLE_REQUEST_LOGGING=False
      - SECRET_KEY=dify-secure-key-${RANDOM:-123456}
      - INIT_PASSWORD=
      - DEPLOY_ENV=PRODUCTION
      - CHECK_UPDATE_URL=https://updates.dify.ai
      - OPENAI_API_BASE=http://llama-server:8080/v1
      - OPENAI_API_KEY=dummy-key
      - EMBEDDING_PROVIDER=local
      - VECTOR_STORE=local
      - LOG_FILE_MAX_SIZE=20
      - DB_TYPE=sqlite
      - WORKER_TYPE=gevent
    volumes:
      - ./config/dify:/app/config:rw
      - ./data/dify:/app/data:rw
      - ./logs/dify:/app/logs:rw
    ports:
      - "${DIFY_PORT:-8002}:5001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.2'
          memory: 512M
