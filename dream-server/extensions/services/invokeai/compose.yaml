services:
  invokeai:
    image: ghcr.io/invoke-ai/invokeai:v6.11.1
    container_name: dream-invokeai
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - INVOKEAI_ROOT=/invokeai
    volumes:
      - ./data/invokeai:/invokeai:rw
    ports:
      - "${INVOKEAI_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
        reservations:
          cpus: '1.0'
          memory: 4G
