services:
  whisper:
    # Default pin is amd64-only. Installers/phases/02-detection.sh overrides
    # WHISPER_IMAGE to a multi-arch sha-<commit>-cuda tag on arm64 hosts.
    image: ${WHISPER_IMAGE:-ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cuda}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          cpus: '4.0'
          memory: 8G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
