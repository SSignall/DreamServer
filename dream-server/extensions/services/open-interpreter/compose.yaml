services:
  open-interpreter:
    image: openinterpreter/openinterpreter:0.3.0
    container_name: dream-open-interpreter
    restart: unless-stopped
    ports:
      - "3005:8000"
    environment:
      - LLM_API_URL=${LLM_API_URL:-http://localhost:8000/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-dummy}
    volumes:
      - ./data/open-interpreter:/home/openinterpreter/.open-interpreter
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
