name: open-interpreter

services:
  open-interpreter:
    image: kunst1080/openinterpreter@sha256:38d8c5cd6ca261b5cb6d6107addd9120b320fb406feea55946f5a4003a1be64b
    container_name: dream-open-interpreter
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - LLM_API_URL=${LLM_API_URL:-http://llama-server:8000}
    volumes:
      - ./data/open-interpreter:/root/.config/Open Interpreter:rw
    ports:
      - "${OPEN_INTERPRETER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dream-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

networks:
  dream-network:
    external: true
