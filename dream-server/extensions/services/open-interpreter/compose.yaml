services:
  open-interpreter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dream-open-interpreter
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - OPENAI_API_BASE=${LLM_API_URL:-http://llama-server:8000}
      - OPENAI_API_KEY=${LLM_API_KEY:-fake_key}
    volumes:
      - ./data/open-interpreter:/root/.open-interpreter
    ports:
      - "${OPENINTERPRETER_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dream-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

networks:
  dream-network:
    external: true
