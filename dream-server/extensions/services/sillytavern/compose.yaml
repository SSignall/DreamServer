services:
  sillytavern:
    image: ghcr.io/sillytavern/sillytavern:1.12.1
    container_name: dream-sillytavern
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${SILLYTAVERN_PORT:-8080}:8080"
    environment:
      - API_URL=${SILLYTAVERN_API_URL:-http://llama-server:8080/v1}
      - PORT=8080
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - ENABLE_UPDATES=false
    volumes:
      - ./data/sillytavern:/home/node/app/server/public/data
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
