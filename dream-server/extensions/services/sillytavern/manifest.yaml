schema_version: dream.services.v1

service:
  id: sillytavern
  name: SillyTavern (Roleplay UI)
  aliases: [silly, roleplay, chat-ui]
  container_name: dream-sillytavern
  host_env: SILLYTAVERN_HOST
  default_host: sillytavern
  port: 8080
  external_port_env: SILLYTAVERN_PORT
  external_port_default: 8080
  health: /
  type: docker
  gpu_backends: [amd, nvidia]
  category: optional
  depends_on: [llama-server]
  env_vars:
    - key: SILLYTAVERN_API_URL
      required: true
      default: http://llama-server:8080/v1
      description: API URL for LLM backend

features:
  - id: roleplay
    name: Character Roleplay Chat
    description: Chat with custom characters via SillyTavern
    icon: Chat
    category: creative
    requirements:
      services: [sillytavern, llama-server]
      vram_gb: 8
    enabled_services_all: [sillytavern]
    setup_time: ~1 minute
    priority: 3
    gpu_backends: [amd, nvidia]
