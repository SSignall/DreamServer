name: immich
version: "1.0.0"
description: Immich - High performance self-hosted photo and video backup solution
category: tool
authors:
  - Immich App
website: https://immich.app/
image: ghcr.io/immich-app/immich-server:v1.130.3
gpu: [amd, nvidia]  # For ML acceleration
port: 2283
data:
  - ./data/immich/upload:/data
  - ./data/immich/postgres:/var/lib/postgresql/data
  - ./data/immich/model-cache:/cache
healthcheck:
  - wget -q --spider http://localhost:2283/api/server/ping
env:
  - LLM_API_URL
dependencies: []
tags: [photos, videos, backup, media, ai]
