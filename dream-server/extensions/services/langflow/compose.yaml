services:
  langflow:
    image: langflowai/langflow:1.8.0
    container_name: dream-langflow
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - LANGFLOW_HOST=0.0.0.0
      - LANGFLOW_PORT=7860
      - LANGFLOW_AUTO_LOGIN=${LANGFLOW_AUTO_LOGIN:-false}
      - LANGFLOW_SUPERUSER=${LANGFLOW_SUPERUSER:-}
      - LANGFLOW_SUPERUSER_PASSWORD=${LANGFLOW_SUPERUSER_PASSWORD:-}
      - LANGFLOW_SECRET_KEY=${LANGFLOW_SECRET_KEY:-}
      - LANGFLOW_NEW_USER_IS_ACTIVE=${LANGFLOW_NEW_USER_IS_ACTIVE:-false}
      - LANGFLOW_AUTO_SAVING=${LANGFLOW_AUTO_SAVING:-true}
      - LANGFLOW_AUTO_SAVING_INTERVAL=${LANGFLOW_AUTO_SAVING_INTERVAL:-10000}
      - LANGFLOW_SAVE_WORK_IN_PROGRESS=${LANGFLOW_SAVE_WORK_IN_PROGRESS:-true}
      - LANGFLOW_MVP_FEATURES=${LANGFLOW_MVP_FEATURES:-false}
      - DO_NOT_TRACK=${LANGFLOW_DO_NOT_TRACK:-true}
    volumes:
      - ./data/langflow:/root/.langflow:rw
    ports:
      - "${LANGFLOW_PORT:-3004}:7860"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dream-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

networks:
  dream-network:
    external: true
