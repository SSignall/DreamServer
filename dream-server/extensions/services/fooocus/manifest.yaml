schema_version: dream.services.v1

service:
  id: fooocus
  name: Fooocus (Image Generation)
  aliases: [image, generation, fooocus-ui]
  container_name: dream-fooocus
  host_env: FOOOCUS_HOST
  default_host: fooocus
  port: 7865
  external_port_env: FOOOCUS_PORT
  external_port_default: 7865
  health: /
  type: docker
  gpu_backends: [amd, nvidia]
  compose_file: compose.yaml
  category: optional
  depends_on: []
