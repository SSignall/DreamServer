schema_version: dream.services.v1

service:
  id: piper-tts
  name: Piper TTS
  aliases: [piper, tts-local, piper-audio]
  container_name: piper-tts
  host_env: PIPER_HOST
  default_host: piper-tts
  port: 10200
  external_port_env: PIPER_PORT
  external_port_default: 10200
  health: /
  type: docker
  gpu_backends: []
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars:
    - key: PIPER_VOICE
      required: false
      description: Default voice model

features:
  - id: neural-tts
    name: Neural Text-to-Speech
    description: Fast local neural TTS optimized for edge devices
    icon: Volume2
    category: voice
    requirements:
      services: [piper-tts]
      vram_gb: 0
    enabled_services_all: [piper-tts]
    setup_time: ~1 minute
    priority: 10
    gpu_backends: []
