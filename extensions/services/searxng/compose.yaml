services:
  searxng:
    image: searxng/searxng:2026.3.6-0716de6bc
    container_name: dream-searxng
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-7810}/
    volumes:
      - ./config/searxng:/etc/searxng:rw
    ports:
      - "${SEARXNG_PORT:-7810}:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - dream-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M

networks:
  dream-network:
    external: true
