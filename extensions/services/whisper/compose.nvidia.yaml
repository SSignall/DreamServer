services:
  whisper:
    image: ghcr.io/speaches-ai/speaches:v0.8.3-cuda
    container_name: dream-whisper
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Patch vad_filter to add vad_parameters (idempotent - only patches once)
        # The marker DREAM_PATCHED ensures we don't double-patch on restart
        if ! grep -q 'DREAM_PATCHED' /home/ubuntu/speaches/src/speaches/routers/stt.py 2>/dev/null; then
          sed -i 's/vad_filter=effective_vad_filter,$/vad_filter=effective_vad_filter, vad_parameters={"threshold": 0.3, "min_silence_duration_ms": 400, "min_speech_duration_ms": 50, "speech_pad_ms": 200},  # DREAM_PATCHED/' /home/ubuntu/speaches/src/speaches/routers/stt.py
        fi
        exec uvicorn --factory speaches.main:create_app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          cpus: '4.0'
          memory: 8G
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dream-network

networks:
  dream-network:
    external: true
