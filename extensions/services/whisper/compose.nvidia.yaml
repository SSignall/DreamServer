services:
  whisper:
    image: ghcr.io/speaches-ai/speaches:v0.8.3-cuda
    container_name: dream-whisper
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    entrypoint: ["/app/docker-entrypoint.sh"]
    volumes:
      - ./data/whisper:/home/ubuntu/.cache/huggingface/hub
      - ./docker-entrypoint.sh:/app/docker-entrypoint.sh:ro
    ports:
      - "${WHISPER_PORT:-9000}:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          cpus: '4.0'
          memory: 8G
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dream-network

networks:
  dream-network:
    external: true
